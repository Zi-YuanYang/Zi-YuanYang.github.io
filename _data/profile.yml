short_bio: >-
  <p>
    I am a Research Fellow at <a href="https://www.ntu.edu.sg/" target="_blank">Nanyang Technological University</a>, advised by Prof.
    <a href="https://scholar.google.com/citations?user=fjzIdMQAAAAJ" target="_blank">Baosheng Yu</a>. I received my Ph.D. from
    <a href="https://en.scu.edu.cn/" target="_blank">Sichuan University</a> in 2025, advised by Prof.
    <a href="https://scholar.google.com/citations?user=kCtQkrkAAAAJ" target="_blank">Yi Zhang</a>. From 2024 to 2025, I was a research
    intern at <a href="https://www.a-star.edu.sg/" target="_blank">A*STAR</a>, advised by
    <a href="https://joeyzhouty.github.io/" target="_blank">Joey Tianyi Zhou</a>.
  </p>
  <p>
    I have published over 20 first-authored papers in top-tier journals and conferences, including CVPR, ICLR, ECCV, AAAI,
    IJCAI, IJCV, IEEE T-IFS, IEEE T-NNLS, IEEE T-SMCS, IEEE T-AI, and IEEE J-BHI.
    <a href="https://scholar.google.com/citations?user=2vZsJskAAAAJ" target="_blank" class="scholar-badge-link">
      <span class="scholar-citation-badge">
        <span class="scholar-citation-badge-label"><i class="fab fa-google-scholar scholar-citation-icon"></i> citations</span>
        <span class="scholar-citation-badge-value" data-scholar-citedby>1316</span>
      </span>
    </a>
    One paper was selected as an ESI
    highly cited paper. If you are interested in academic collaborations, please feel free to contact me.
  <p>
    Research keywords:
    <span class="text-hl">AI Security</span>,
    <span class="text-hl">AI in Healthcare</span>,
    <span class="text-hl">Biometrics</span>,
    <span class="text-hl">Federated Learning</span>,
    <span class="text-hl">AI Efficiency</span>.
  </p>
  </p>
  <div class="collab-invite">
        <!-- <span class="collab-invite-label">🔥🔥🔥</span> -->
        <p>
         Please feel free to reach out if you're interested in exploring ideas together, I am always happy to discuss new ideas and explore potential collaborations.
    </p>
  </div>

