short_bio: >-
  <p>
    I am currently a Ph.D student at the Deep Imaging Group (DIG) at <a href="https://deep-imaging-group.github.io/" target="_blank">Sichuan University (SCU)</a> in Chengdu, China under the supervision of Prof. <a href="https://scholar.google.com.hk/citations?hl=zh-CN&user=kCtQkrkAAAAJ" target="_blank">Yi Zhang</a>.
    Previously, I finished my B.Eng in Software Engineering at Sichuan University in June 2021
    I received my B.Eng. degree in Software Engineering from Sichuan University in June 2021, ranking 13/264 undergraduate students. Following graduation, I was directly admitted to the Ph.D. program at the College of Computer Science, Sichuan University.
  </p>
  <p>
    Research keywords include: <span class="text-hl">Medical Imaging and Analysis</span>, <span class="text-hl">Trustworthy AI</span>, <span class="text-hl">Federated Learning</span>, and so on.
  </p>
  

