name: Refresh Citation Counts

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update citation counts
        run: python tools/update_citation_counts.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No citation updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _publications
          git commit -m "chore: refresh citation counts"
          git push
